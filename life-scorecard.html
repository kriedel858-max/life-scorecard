<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Life Scorecard" />
  <title>Life Scorecard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #eeece9;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --blue: #185FA5;
      --green-bg: #EAF3DE; --green-text: #3B6D11;
      --red-bg: #FCEBEB; --red-text: #A32D2D;
      --amber-bg: #FAEEDA; --amber-text: #854F0B;
      --blue-bg: #E6F1FB; --blue-text: #185FA5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #262624;
        --bg-tertiary: #2e2e2b;
        --text-primary: #f0ede8;
        --text-secondary: #9a9a94;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
        --green-bg: #1a2e10; --green-text: #8ecf5a;
        --red-bg: #2e1010; --red-text: #f08080;
        --amber-bg: #2e1e08; --amber-text: #f0b860;
        --blue-bg: #0c1e35; --blue-text: #6aabf0;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app { max-width: 600px; margin: 0 auto; padding: 1.25rem 1rem 5rem; }

    /* Header */
    .header { margin-bottom: 1.25rem; }
    .header h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* Score cards */
    .score-cards { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .score-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px; }
    .score-card .label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
    .score-card .value { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .score-card .sub { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

    /* Rank bar */
    .rank-bar-wrap { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
    .rank-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .rank-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .rank-next { font-size: 12px; color: var(--text-secondary); }
    .progress-track { height: 8px; background: var(--bg-secondary); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: var(--blue); transition: width 0.4s ease; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 4px; }
    .tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 13px; color: var(--text-secondary); border-radius: 6px; cursor: pointer; border: none; background: transparent; -webkit-tap-highlight-color: transparent; }
    .tab.active { background: var(--bg-primary); color: var(--text-primary); font-weight: 600; border: 0.5px solid var(--border); }

    .section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Habit cards */
    .habits-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .habit-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: border-color 0.15s; active:opacity:0.8; }
    .habit-card:active { opacity: 0.75; }
    .habit-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; margin-bottom: 10px; }
    .habit-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .habit-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
    .habit-log-count { font-size: 11px; color: var(--text-secondary); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }

    /* Rewards */
    .rewards-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .reward-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }
    .reward-card.locked { opacity: 0.5; }
    .reward-icon { font-size: 30px; margin-bottom: 8px; }
    .reward-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
    .reward-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.4; }
    .reward-meta { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .pill { display: inline-flex; font-size: 11px; padding: 3px 9px; border-radius: 99px; width: fit-content; font-weight: 500; }
    .pill-unlock { background: var(--blue-bg); color: var(--blue-text); }
    .pill-locked { background: var(--bg-secondary); color: var(--text-secondary); }
    .pill-cost { background: var(--amber-bg); color: var(--amber-text); }
    .redeem-btn { width: 100%; padding: 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: transparent; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-primary); -webkit-tap-highlight-color: transparent; }
    .redeem-btn:active:not(:disabled) { opacity: 0.7; }
    .redeem-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .redeem-btn.can-redeem { border-color: var(--blue); color: var(--blue); }
    .redeemed-count { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }

    /* Log */
    .log-panel { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
    .log-panel-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
    .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
    .log-entry:last-child { border-bottom: none; }
    .log-name { font-size: 13px; color: var(--text-primary); }
    .log-detail { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
    .log-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .log-pts { font-size: 13px; font-weight: 600; }
    .pts-pos { color: var(--green-text); }
    .pts-neg { color: var(--red-text); }
    .pts-reward { color: var(--amber-text); }
    .log-time { font-size: 11px; color: var(--text-secondary); }
    .empty-state { font-size: 13px; color: var(--text-secondary); padding: 8px 0; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .modal { background: var(--bg-primary); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; padding: 1.25rem 1.25rem 1.5rem; }
    .modal-handle { width: 36px; height: 4px; background: var(--border-md); border-radius: 99px; margin: 0 auto 1rem; }
    .modal-title { font-size: 17px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; }
    .modal-btn { padding: 13px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg-secondary); font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--text-primary); -webkit-tap-highlight-color: transparent; }
    .modal-btn:active { opacity: 0.7; }
    .modal-btn-pts { font-size: 13px; font-weight: 600; }
    .modal-cancel { margin-top: 8px; text-align: center; font-size: 15px; color: var(--blue); cursor: pointer; padding: 10px; -webkit-tap-highlight-color: transparent; }

    /* Toast */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 99px; font-size: 14px; font-weight: 600; z-index: 200; white-space: nowrap; transition: opacity 0.3s; pointer-events: none; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Life Scorecard</h1>
    <p id="date-str"></p>
  </div>

  <div class="score-cards">
    <div class="score-card">
      <div class="label">Points</div>
      <div class="value" id="total-pts">0</div>
      <div class="sub">to spend</div>
    </div>
    <div class="score-card">
      <div class="label">Today</div>
      <div class="value" id="today-pts">0</div>
      <div class="sub">pts logged</div>
    </div>
    <div class="score-card">
      <div class="label">Rewards</div>
      <div class="value" id="rewards-claimed">0</div>
      <div class="sub">claimed</div>
    </div>
  </div>

  <div class="rank-bar-wrap">
    <div class="rank-row">
      <span class="rank-label" id="rank-label">Associate</span>
      <span class="rank-next" id="rank-next"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')">Log</button>
    <button class="tab" onclick="switchTab('rewards')">Rewards</button>
    <button class="tab" onclick="switchTab('history')">Today</button>
  </div>

  <div id="tab-log">
    <div class="section-title">Tap a habit to log it</div>
    <div class="habits-grid" id="habits-grid"></div>
  </div>

  <div id="tab-rewards" style="display:none;">
    <div class="section-title">Earn to unlock · spend to claim</div>
    <div class="rewards-grid" id="rewards-grid"></div>
  </div>

  <div id="tab-history" style="display:none;">
    <div class="log-panel">
      <div class="log-panel-title">Today's entries</div>
      <div id="log-list"><p class="empty-state">No entries yet today.</p></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub">Choose what happened:</div>
    <div class="modal-actions" id="modal-actions"></div>
    <div class="modal-cancel" onclick="closeModal()">Cancel</div>
  </div>
</div>

<script>
const habits = [
  { id:'exercise', name:'Exercise', icon:'🏃', color:'#EAF3DE', desc:'Workout, walk, or movement', actions:[
    {label:'Full workout — push-ups & sit-ups', pts:20},
    {label:'Short walk / light activity', pts:10},
    {label:'Skipped — sedentary day', pts:-10}
  ]},
  { id:'diet', name:'Diet', icon:'🥗', color:'#E1F5EE', desc:'Eating & nutrition choices', actions:[
    {label:'Clean, intentional meals', pts:15},
    {label:'One small slip', pts:-5},
    {label:'Poor eating choices', pts:-15}
  ]},
  { id:'sleep', name:'Sleep', icon:'🌙', color:'#E6F1FB', desc:'Rest & recovery', actions:[
    {label:'Solid 7–8 hours', pts:15},
    {label:'Decent but short', pts:5},
    {label:'Poor sleep / stayed up late', pts:-10}
  ]},
  { id:'work', name:'Work & Prep', icon:'💼', color:'#FAEEDA', desc:'Loan officer readiness', actions:[
    {label:'Overall solid, productive day', pts:20},
    {label:'Handled key tasks proactively', pts:15},
    {label:'Managed high demands effectively', pts:5},
    {label:'Reactive / procrastinated', pts:-10}
  ]},
  { id:'finance', name:'Finance', icon:'📊', color:'#EEEDFE', desc:'Spending & financial discipline', actions:[
    {label:'Stuck to budget', pts:15},
    {label:'Minor unplanned spend', pts:-5},
    {label:'Significant overspend', pts:-20}
  ]},
  { id:'spiritual', name:'Spiritual', icon:'✝', color:'#FBEAF0', desc:'Faith & personal integrity', actions:[
    {label:'Prayer / scripture / devotion', pts:15},
    {label:'Clean day — stayed true', pts:20},
    {label:'Struggled today', pts:-25}
  ]}
];

const rewards = [
  { id:'reading', name:'Reading for pleasure', icon:'📖', desc:'An evening with great literature — Dickens, Twain, your call.', unlockAt:50,  cost:15 },
  { id:'cigar',   name:'Premium cigar',        icon:'🍂', desc:'Light up a fine smoke. Well earned.',                          unlockAt:100, cost:40 },
  { id:'dodgers', name:'Dodger game',           icon:'⚾', desc:'Kick back and watch the Boys in Blue.',                        unlockAt:200, cost:75 },
  { id:'icecream',name:'Ice cream',             icon:'🍦', desc:'The ultimate indulgence. Worth every point.',                  unlockAt:300, cost:120 }
];

const ranks = [
  {label:'Associate',           min:0,    max:250},
  {label:'Loan Officer I',      min:250,  max:600},
  {label:'Loan Officer II',     min:600,  max:1100},
  {label:'Senior Loan Officer', min:1100, max:2000},
  {label:'Branch Leader',       min:2000, max:3500},
  {label:'Executive',           min:3500, max:9999}
];

let state;
try { state = JSON.parse(localStorage.getItem('lsc_v1') || 'null') || null; } catch(e) { state = null; }
if (!state) state = {totalPts:0, allTimePts:0, todayPts:0, todayDate:'', streak:0, lastActiveDate:'', bestStreak:0, log:[], privateLog:[], redeemCounts:{}};

function save() { try { localStorage.setItem('lsc_v1', JSON.stringify(state)); } catch(e) {} }

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function resetTodayIfNeeded() {
  const t = todayStr();
  if (state.todayDate !== t) {
    if (state.todayDate && state.lastActiveDate) {
      const prev = new Date(state.lastActiveDate), now = new Date(t);
      const diff = Math.round((now - prev) / 86400000);
      state.streak = diff === 1 ? state.streak + 1 : 0;
    }
    state.todayPts = 0;
    state.todayDate = t;
    state.log = [];
  }
}

function getRank(pts) {
  for (let i = ranks.length-1; i >= 0; i--) if (pts >= ranks[i].min) return ranks[i];
  return ranks[0];
}

function updateUI() {
  const d = new Date();
  document.getElementById('date-str').textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('total-pts').textContent = state.totalPts.toLocaleString();
  document.getElementById('today-pts').textContent = (state.todayPts >= 0 ? '+' : '') + state.todayPts;
  const totalRedeemed = Object.values(state.redeemCounts||{}).reduce((a,b)=>a+b,0);
  document.getElementById('rewards-claimed').textContent = totalRedeemed;

  const pts = state.allTimePts || 0;
  const rank = getRank(pts);
  const nextRank = ranks.find(r => r.min > pts);
  document.getElementById('rank-label').textContent = rank.label;
  if (nextRank) {
    const pct = Math.min(100, Math.round(((pts - rank.min) / (rank.max - rank.min)) * 100));
    document.getElementById('rank-next').textContent = (nextRank.min - pts) + ' pts to ' + nextRank.label;
    document.getElementById('progress-fill').style.width = pct + '%';
  } else {
    document.getElementById('rank-next').textContent = 'Max rank reached';
    document.getElementById('progress-fill').style.width = '100%';
  }
  renderLog();
  renderRewards();
}

function renderHabits() {
  const grid = document.getElementById('habits-grid');
  grid.innerHTML = '';
  habits.forEach(h => {
    const count = (state.log||[]).filter(e => e.hid === h.id).length;
    const div = document.createElement('div');
    div.className = 'habit-card';
    div.innerHTML = `
      <div class="habit-icon" style="background:${h.color}">${h.icon}</div>
      <div class="habit-name">${h.name}</div>
      <div class="habit-desc">${h.desc}</div>
      ${count > 0 ? `<div class="habit-log-count">${count} log${count>1?'s':''} today</div>` : ''}
    `;
    div.onclick = () => openModal(h);
    grid.appendChild(div);
  });
}

function renderRewards() {
  const grid = document.getElementById('rewards-grid');
  if (!grid) return;
  grid.innerHTML = '';
  rewards.forEach(r => {
    const allTime = state.allTimePts || 0;
    const unlocked = allTime >= r.unlockAt;
    const canRedeem = unlocked && state.totalPts >= r.cost;
    const count = (state.redeemCounts||{})[r.id] || 0;
    const div = document.createElement('div');
    div.className = 'reward-card' + (unlocked ? '' : ' locked');
    div.innerHTML = `
      <div class="reward-icon">${r.icon}</div>
      <div class="reward-name">${r.name}</div>
      <div class="reward-desc">${r.desc}</div>
      <div class="reward-meta">
        <span class="pill ${unlocked ? 'pill-unlock' : 'pill-locked'}">${unlocked ? 'Unlocked' : 'Unlock at ' + r.unlockAt + ' pts'}</span>
        <span class="pill pill-cost">Costs ${r.cost} pts</span>
      </div>
      <button class="redeem-btn ${canRedeem ? 'can-redeem' : ''}" ${canRedeem?'':'disabled'} onclick="redeemReward('${r.id}','${r.name.replace(/'/g,"\\'")}',${r.cost})">
        ${canRedeem ? 'Claim reward' : unlocked ? 'Not enough points' : 'Locked'}
      </button>
      ${count > 0 ? `<div class="redeemed-count">Claimed ${count}x</div>` : ''}
    `;
    grid.appendChild(div);
  });
}

function redeemReward(id, name, cost) {
  if (state.totalPts < cost) return;
  state.totalPts -= cost;
  state.redeemCounts = state.redeemCounts || {};
  state.redeemCounts[id] = (state.redeemCounts[id]||0) + 1;
  const timeStr = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  state.log.unshift({hid:'reward', name:'Reward: '+name, pts:-cost, label:'Claimed reward', time:timeStr, isReward:true});
  save();
  updateUI();
  showToast('Enjoy your ' + name + '!', 'amber');
}

function renderLog() {
  const list = document.getElementById('log-list');
  if (!list) return;
  const entries = state.log || [];
  if (!entries.length) { list.innerHTML = '<p class="empty-state">No entries yet today.</p>'; return; }
  list.innerHTML = entries.map(e => `
    <div class="log-entry">
      <div>
        <div class="log-name">${e.name}</div>
        <div class="log-detail">${e.label}</div>
      </div>
      <div class="log-right">
        <span class="log-pts ${e.isReward ? 'pts-reward' : e.pts>=0 ? 'pts-pos' : 'pts-neg'}">${e.pts>=0&&!e.isReward?'+':''}${e.pts}</span>
        <span class="log-time">${e.time}</span>
      </div>
    </div>`).join('');
}

function openModal(habit) {
  const isPrivate = habit.id === 'spiritual';
  document.getElementById('modal-title').textContent = habit.icon + '  ' + habit.name;
  const actions = document.getElementById('modal-actions');
  actions.innerHTML = habit.actions.map(a => {
    const hidePoints = isPrivate && a.pts < 0;
    const ptsClass = a.pts >= 0 ? 'pts-pos' : 'pts-neg';
    const ptsStr = (a.pts >= 0 ? '+' : '') + a.pts + ' pts';
    return `<button class="modal-btn" onclick="logEntry('${habit.id}','${habit.name.replace(/'/g,"\\'")}',${a.pts},'${a.label.replace(/'/g,"\\'")}',${isPrivate && a.pts < 0})">
      <span>${a.label}</span>
      ${hidePoints ? '' : `<span class="modal-btn-pts ${ptsClass}">${ptsStr}</span>`}
    </button>`;
  }).join('');
  document.getElementById('modal-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function logEntry(hid, hname, pts, label, isPrivate) {
  closeModal();
  const timeStr = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  if (isPrivate) {
    state.privateLog = state.privateLog || [];
    state.privateLog.push({hid, label, time:timeStr, date:todayStr()});
  } else {
    state.log.unshift({hid, name:hname, pts, label, time:timeStr});
    state.totalPts = Math.max(0, state.totalPts + pts);
    if (pts > 0) state.allTimePts = (state.allTimePts||0) + pts;
    state.todayPts += pts;
    state.lastActiveDate = todayStr();
    state.bestStreak = Math.max(state.streak, state.bestStreak);
    showToast((pts>=0?'+':'') + pts + ' pts — ' + hname, pts>=0 ? 'green' : 'red');
  }
  save();
  renderHabits();
  updateUI();
}

function showToast(msg, color) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  const colors = {
    green: 'background:#EAF3DE;color:#3B6D11;',
    red:   'background:#FCEBEB;color:#A32D2D;',
    amber: 'background:#FAEEDA;color:#854F0B;'
  };
  t.style.cssText = (colors[color] || colors.green) + 'box-shadow:0 2px 12px rgba(0,0,0,0.15);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2200);
}

function switchTab(tab) {
  ['log','rewards','history'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['log','rewards','history'][i]===tab);
  });
  if (tab==='rewards') renderRewards();
}

resetTodayIfNeeded();
